services:
  mysql-libros:
    image: mysql:8.0
    container_name: mysql-libros
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: libros_db
    ports:
      - "3309:3306"
    volumes:
      - libros_data:/var/lib/mysql
      - ./sql/libros.sql:/docker-entrypoint-initdb.d/libros.sql

  mysql-prestamos:
    image: mysql:8.0
    container_name: mysql-prestamos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prestamos_db
    ports:
      - "3312:3306"
    volumes:
      - prestamos_data:/var/lib/mysql
      - ./sql/prestamos.sql:/docker-entrypoint-initdb.d/prestamos.sql

  libros-service:
    build: ./libros-service
    container_name: libros-service
    depends_on:
      - mysql-libros
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-libros:3306/libros_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  prestamos-service:
    build: ./prestamos-service
    container_name: prestamos-service
    depends_on:
      - mysql-prestamos
      - libros-service
    ports:
      - "8094:8094"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-prestamos:3306/prestamos_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      LIBROS_SERVICE_URL: http://libros-service:8081

volumes:
  libros_data:
  prestamos_data: